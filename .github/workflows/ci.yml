name: 🚀 CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: 🔬 CI/CD
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6.0.2

      - name: 📦 Set up pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: latest

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@thuanpanda'

      - name: 🔧 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type-check
        run: pnpm typecheck

      - name: 🧪 Test
        run: pnpm test

      - name: 🏗️ Build
        run: pnpm build

      - name: 🔍 Should publish?
        if: github.ref == 'refs/heads/main'
        id: should_publish
        run: bash .github/scripts/should-publish.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: 🚢 Publish to GitHub Packages
        if: github.ref == 'refs/heads/main' && steps.should_publish.outputs.changed == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
